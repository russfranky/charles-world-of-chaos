name: CI

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  build-and-validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Build Cel Band Pack
        run: chmod +x scripts/build_pack.sh && ./scripts/build_pack.sh

      - name: Validate pack
        run: python3 scripts/validate_pack.py

      - name: QA registry suite
        run: python3 qa/run_qa_suite.py

      - name: Upload distributable
        uses: actions/upload-artifact@v4
        with:
          name: Cel_Band_Pack
          path: dist/Cel_Band_Pack.mcpack
          retention-days: 30
