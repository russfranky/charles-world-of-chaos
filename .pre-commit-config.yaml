repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.9.6
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-json
        exclude: ^variants/ultimate-chaos-pack/vanilla_src/
      - id: detect-private-key

  - repo: local
    hooks:
      - id: block-venice-keys
        name: Block Venice API keys in committed files
        entry: python3 scripts/hooks/check_secrets.py
        language: system
        pass_filenames: true
